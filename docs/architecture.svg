<svg width="680" height="530" viewBox="0 0 680 530" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Arquitectura de produccion de cadvcs</title>
  <style>
    .th { font: 500 14px ui-sans-serif, system-ui, sans-serif; }
    .ts { font: 400 12px ui-sans-serif, system-ui, sans-serif; }
    .gray   rect { fill: #F1EFE8; stroke: #5F5E5A; }
    .gray   .th  { fill: #2C2C2A; } .gray .ts { fill: #5F5E5A; }
    .purple rect { fill: #EEEDFE; stroke: #534AB7; }
    .purple .th  { fill: #26215C; } .purple .ts { fill: #534AB7; }
    .teal   rect { fill: #E1F5EE; stroke: #0F6E56; }
    .teal   .th  { fill: #04342C; } .teal .ts { fill: #0F6E56; }
    .arr { stroke: #888780; stroke-width: 1.5; fill: none; }
    @media (prefers-color-scheme: dark) {
      .gray   rect { fill: #444441; stroke: #B4B2A9; }
      .gray   .th  { fill: #F1EFE8; } .gray .ts { fill: #D3D1C7; }
      .purple rect { fill: #3C3489; stroke: #AFA9EC; }
      .purple .th  { fill: #EEEDFE; } .purple .ts { fill: #CECBF6; }
      .teal   rect { fill: #085041; stroke: #5DCAA5; }
      .teal   .th  { fill: #E1F5EE; } .teal .ts { fill: #9FE1CB; }
      .arr { stroke: #B4B2A9; }
    }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <g class="gray"><rect x="70" y="40" width="160" height="56" rx="8" stroke-width="0.75"/>
    <text class="th" x="150" y="62" text-anchor="middle">Plugin AutoCAD</text>
    <text class="ts" x="150" y="82" text-anchor="middle">lock + heartbeat</text></g>
  <g class="gray"><rect x="260" y="40" width="160" height="56" rx="8" stroke-width="0.75"/>
    <text class="th" x="340" y="62" text-anchor="middle">CLI</text>
    <text class="ts" x="340" y="82" text-anchor="middle">scripting, CI</text></g>
  <g class="gray"><rect x="450" y="40" width="160" height="56" rx="8" stroke-width="0.75"/>
    <text class="th" x="530" y="62" text-anchor="middle">Web UI</text>
    <text class="ts" x="530" y="82" text-anchor="middle">viewer, diff visual</text></g>

  <line class="arr" x1="150" y1="96" x2="150" y2="136" marker-end="url(#a)"/>
  <line class="arr" x1="340" y1="96" x2="340" y2="136" marker-end="url(#a)"/>
  <line class="arr" x1="530" y1="96" x2="530" y2="136" marker-end="url(#a)"/>

  <g class="purple"><rect x="70" y="140" width="540" height="56" rx="8" stroke-width="0.75"/>
    <text class="th" x="340" y="162" text-anchor="middle">API REST</text>
    <text class="ts" x="340" y="182" text-anchor="middle">OIDC, authz, presigned URLs</text></g>

  <line class="arr" x1="150" y1="196" x2="150" y2="236" marker-end="url(#a)"/>
  <line class="arr" x1="340" y1="196" x2="340" y2="236" marker-end="url(#a)"/>
  <line class="arr" x1="530" y1="196" x2="530" y2="236" marker-end="url(#a)"/>

  <g class="teal"><rect x="70" y="240" width="160" height="56" rx="8" stroke-width="0.75"/>
    <text class="th" x="150" y="262" text-anchor="middle">PostgreSQL</text>
    <text class="ts" x="150" y="282" text-anchor="middle">metadata y locks</text></g>
  <g class="teal"><rect x="260" y="240" width="160" height="56" rx="8" stroke-width="0.75"/>
    <text class="th" x="340" y="262" text-anchor="middle">Redis</text>
    <text class="ts" x="340" y="282" text-anchor="middle">cache renders</text></g>
  <g class="teal"><rect x="450" y="240" width="160" height="56" rx="8" stroke-width="0.75"/>
    <text class="th" x="530" y="262" text-anchor="middle">Object storage</text>
    <text class="ts" x="530" y="282" text-anchor="middle">blobs SHA-256</text></g>

  <line class="arr" x1="150" y1="296" x2="150" y2="336" marker-end="url(#a)"/>

  <g class="purple"><rect x="70" y="340" width="540" height="44" rx="8" stroke-width="0.75"/>
    <text class="th" x="340" y="358" text-anchor="middle">Kafka</text>
    <text class="ts" x="340" y="376" text-anchor="middle">eventos via outbox</text></g>

  <line class="arr" x1="150" y1="384" x2="150" y2="426" marker-end="url(#a)"/>
  <line class="arr" x1="340" y1="384" x2="340" y2="426" marker-end="url(#a)"/>
  <line class="arr" x1="530" y1="384" x2="530" y2="426" marker-end="url(#a)"/>

  <g class="purple"><rect x="70" y="430" width="160" height="56" rx="8" stroke-width="0.75"/>
    <text class="th" x="150" y="452" text-anchor="middle">Worker indexado</text>
    <text class="ts" x="150" y="472" text-anchor="middle">entidades DXF</text></g>
  <g class="purple"><rect x="260" y="430" width="160" height="56" rx="8" stroke-width="0.75"/>
    <text class="th" x="340" y="452" text-anchor="middle">Worker conversion</text>
    <text class="ts" x="340" y="472" text-anchor="middle">DWG a DXF (ODA)</text></g>
  <g class="purple"><rect x="450" y="430" width="160" height="56" rx="8" stroke-width="0.75"/>
    <text class="th" x="530" y="452" text-anchor="middle">Worker render</text>
    <text class="ts" x="530" y="472" text-anchor="middle">SVG, overlay diff</text></g>
</svg>
