# PLANTILLA. No comitear secretos reales. En producción, generar con
# `kubectl create secret` o un gestor externo (Sealed Secrets, External
# Secrets Operator + AWS Secrets Manager / GCP Secret Manager / Vault).
apiVersion: v1
kind: Secret
metadata:
  name: cadvcs-secrets
  namespace: cadvcs
type: Opaque
stringData:
  POSTGRES_PASSWORD: "cambia-esto"
  # Credenciales de object storage (o usar IAM Roles for Service Accounts
  # en EKS / Workload Identity en GKE, y omitir estas claves)
  AWS_ACCESS_KEY_ID: "cambia-esto"
  AWS_SECRET_ACCESS_KEY: "cambia-esto"
  AWS_DEFAULT_REGION: "eu-west-1"
