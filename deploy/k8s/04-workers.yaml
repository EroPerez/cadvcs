# Relay: lee el outbox (PostgreSQL) y publica en Kafka. UNA sola réplica:
# es un proceso ligero y un único relay evita publicar el mismo evento
# desde varias instancias (el reenvío es inofensivo por idempotencia, pero
# innecesario). Si se quiere HA, usar un lease/leader-election.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cadvcs-relay
  namespace: cadvcs
spec:
  replicas: 1
  selector:
    matchLabels: { app: cadvcs-relay }
  template:
    metadata:
      labels: { app: cadvcs-relay }
    spec:
      containers:
        - name: relay
          image: ghcr.io/eroperez/cadvcs:latest
          command: ["python", "-m", "cadvcs.worker", "--mode", "relay", "--interval", "2.0"]
          envFrom:
            - configMapRef: { name: cadvcs-config }
            - secretRef: { name: cadvcs-secrets }
          env:
            - name: CADVCS_DB_URL
              value: "postgresql://$(PGUSER):$(POSTGRES_PASSWORD)@$(PGHOST)/$(PGDATABASE)"
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
---
# Worker (consumer): procesa eventos de Kafka (indexado DXF y conversión
# DWG→DXF). Escala horizontal: el consumer group de Kafka reparte las
# particiones entre las réplicas. Para conversión DWG, montar la licencia
# de Aspose y poner CADVCS_DWG_CONVERTER=aspose (o el binario ODA).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cadvcs-worker
  namespace: cadvcs
spec:
  replicas: 2
  selector:
    matchLabels: { app: cadvcs-worker }
  template:
    metadata:
      labels: { app: cadvcs-worker }
    spec:
      containers:
        - name: worker
          image: ghcr.io/eroperez/cadvcs:latest
          command: ["python", "-m", "cadvcs.worker", "--mode", "consume"]
          envFrom:
            - configMapRef: { name: cadvcs-config }
            - secretRef: { name: cadvcs-secrets }
          env:
            - name: CADVCS_DB_URL
              value: "postgresql://$(PGUSER):$(POSTGRES_PASSWORD)@$(PGHOST)/$(PGDATABASE)"
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits: { cpu: "2", memory: "2Gi" }   # la conversión DWG es pesada
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cadvcs-worker
  namespace: cadvcs
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cadvcs-worker
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 75 }
