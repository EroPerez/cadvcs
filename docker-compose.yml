# Stack de producción mínimo: API + PostgreSQL.
# Los blobs viven en el volumen cadvcs-data (S3/OCI en la evolución
# descrita en ARCHITECTURE.md); la metadata en PostgreSQL.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cadvcs
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?definir en .env}
      POSTGRES_DB: cadvcs
    volumes:
      - cadvcs-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cadvcs"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      CADVCS_DB_URL: postgresql://cadvcs:${POSTGRES_PASSWORD}@db:5432/cadvcs
      CADVCS_DATA: /data
      CADVCS_OIDC_ISSUER: ${CADVCS_OIDC_ISSUER:-}
      CADVCS_OIDC_AUDIENCE: ${CADVCS_OIDC_AUDIENCE:-cadvcs}
      CADVCS_DEFAULT_ROLES: ${CADVCS_DEFAULT_ROLES:-editor}
    volumes:
      - cadvcs-data:/data
    ports:
      - "8000:8000"

  # Relay: publica el outbox en Kafka. Consumer: procesa los eventos.
  # Sin Kafka, usa en su lugar un único worker en modo poll (ver README).
  relay:
    build: .
    depends_on:
      db: { condition: service_healthy }
      kafka: { condition: service_healthy }
    environment:
      CADVCS_DB_URL: postgresql://cadvcs:${POSTGRES_PASSWORD}@db:5432/cadvcs
      CADVCS_DATA: /data
      CADVCS_KAFKA_BROKERS: kafka:9092
    volumes:
      - cadvcs-data:/data
    command: ["python", "-m", "cadvcs.worker", "--mode", "relay", "--interval", "2.0"]

  worker:
    build: .
    depends_on:
      db: { condition: service_healthy }
      kafka: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      CADVCS_DB_URL: postgresql://cadvcs:${POSTGRES_PASSWORD}@db:5432/cadvcs
      CADVCS_DATA: /data
      CADVCS_KAFKA_BROKERS: kafka:9092
      CADVCS_REDIS_URL: redis://redis:6379/0
      CADVCS_DWG_CONVERTER: ${CADVCS_DWG_CONVERTER:-none}
    volumes:
      - cadvcs-data:/data
    # Consumer de Kafka (escala con réplicas: reparten particiones)
    command: ["python", "-m", "cadvcs.worker", "--mode", "consume"]

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  kafka:
    # Imagen oficial de Apache (mantenida). Bitnami movió sus tags de
    # versión a docker.io/bitnamilegacy (sin updates) desde 2025-08-28,
    # por eso bitnami/kafka:3.7 da "manifest unknown".
    image: apache/kafka:3.9.1
    environment:
      KAFKA_NODE_ID: "0"
      KAFKA_PROCESS_ROLES: "controller,broker"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  cadvcs-pg:
  cadvcs-data:
