<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>cadvcs · control de versiones de planos</title>
<style>
  /* — Tokens: mesa de dibujo —
     paper workspace · ink azul-negro estructural · cianotipo · rojo de
     revisión (semántico: eliminado/conflicto). Mono para todo dato. */
  :root {
    --paper: #fbfaf7;
    --vellum: #f2efe7;
    --hairline: #d8d4c8;
    --ink: #14202e;
    --ink-soft: #5a6675;
    --blueprint: #1c4b8c;
    --revision: #c8312b;
    --added: #16a34a;
    --modified: #d97706;
    --shadow: 0 1px 0 var(--hairline);
    --ui: ui-sans-serif, "Helvetica Neue", Arial, sans-serif;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: var(--ui); color: var(--ink); background: var(--paper);
    font-size: 14px; line-height: 1.5;
    display: grid; grid-template-rows: auto 1fr;
  }
  @media (prefers-reduced-motion: no-preference) {
    .fade { animation: fade .18s ease-out; }
    @keyframes fade { from { opacity: 0; transform: translateY(2px); } }
  }

  /* — Top bar — */
  header {
    display: flex; align-items: baseline; gap: 16px;
    padding: 12px 18px; border-bottom: 1px solid var(--hairline);
    background: var(--paper);
  }
  .brand { font-weight: 700; letter-spacing: .02em; font-size: 16px; }
  .brand b { color: var(--blueprint); }
  .brand .rev { color: var(--revision); }
  header .spacer { flex: 1; }
  .token-field { display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--ink-soft); }
  .token-field input {
    font-family: var(--mono); font-size: 12px; width: 200px;
    border: 1px solid var(--hairline); border-radius: 3px; padding: 4px 6px;
    background: #fff;
  }
  .health { font-family: var(--mono); font-size: 11px; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    vertical-align: middle; margin-right: 5px; }

  /* — App shell: rail · lienzo · contexto — */
  main { display: grid; grid-template-columns: 240px 1fr 340px; min-height: 0; }
  .rail, .ctx { border-right: 1px solid var(--hairline);
    overflow: auto; padding: 14px; }
  .ctx { border-right: none; border-left: 1px solid var(--hairline);
    background: var(--vellum); }
  .canvas { overflow: auto; padding: 18px 22px; min-width: 0; }

  /* — Rail — */
  .eyebrow { font-size: 11px; text-transform: uppercase; letter-spacing: .09em;
    color: var(--ink-soft); margin: 16px 0 7px; font-weight: 600; }
  .eyebrow:first-child { margin-top: 0; }
  .repo-item, .branch-item {
    display: flex; align-items: center; gap: 7px; padding: 6px 8px;
    border-radius: 4px; cursor: pointer; font-size: 13px;
  }
  .repo-item:hover, .branch-item:hover { background: var(--vellum); }
  .repo-item.active, .branch-item.active {
    background: var(--ink); color: var(--paper); }
  .branch-item .cur { color: var(--revision); font-weight: 700; }
  .repo-item.active .cur { color: #ff9b95; }
  .mono { font-family: var(--mono); }
  .muted { color: var(--ink-soft); }

  /* — Tabs — */
  .tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--hairline);
    margin-bottom: 16px; }
  .tab { padding: 8px 14px; cursor: pointer; font-size: 13px;
    border-bottom: 2px solid transparent; color: var(--ink-soft); }
  .tab.active { color: var(--ink); border-bottom-color: var(--blueprint);
    font-weight: 600; }

  /* — Commit log: una hairline vertical recorre la historia — */
  .log { list-style: none; padding: 0; margin: 0; }
  .commit { display: grid; grid-template-columns: 80px 1fr auto; gap: 12px;
    padding: 10px 0; border-bottom: 1px solid var(--hairline); cursor: pointer;
    align-items: baseline; }
  .commit:hover { background: var(--vellum); }
  .commit .cid { font-family: var(--mono); color: var(--blueprint);
    font-weight: 600; }
  .commit .cid.merge { color: var(--revision); }
  .commit .msg { min-width: 0; }
  .commit .who { font-size: 12px; color: var(--ink-soft);
    font-family: var(--mono); white-space: nowrap; }
  .deco { display: inline-block; font-family: var(--mono); font-size: 11px;
    border: 1px solid var(--blueprint); color: var(--blueprint);
    border-radius: 3px; padding: 0 5px; margin-left: 6px; }
  .deco.tag { border-color: var(--revision); color: var(--revision); }

  /* — Drawing viewport — */
  .viewport { border: 1px solid var(--hairline); background: #fff;
    border-radius: 4px; padding: 10px; min-height: 220px;
    display: flex; align-items: center; justify-content: center; }
  .viewport svg { max-width: 100%; height: auto; }
  .legend { display: flex; gap: 16px; font-size: 12px; margin: 10px 0 0;
    font-family: var(--mono); color: var(--ink-soft); flex-wrap: wrap; }
  .legend span::before { content: ""; display: inline-block; width: 10px;
    height: 10px; margin-right: 5px; vertical-align: middle; border-radius: 2px; }
  .lg-add::before { background: var(--added); }
  .lg-mod::before { background: var(--modified); }
  .lg-del::before { background: var(--revision); }

  /* — Controls — */
  label.fld { display: block; font-size: 12px; color: var(--ink-soft);
    margin: 12px 0 4px; }
  select, input.txt, textarea {
    width: 100%; border: 1px solid var(--hairline); border-radius: 4px;
    padding: 7px 9px; font-family: var(--ui); font-size: 13px; background: #fff;
  }
  textarea { font-family: var(--mono); resize: vertical; min-height: 56px; }
  .btn { display: inline-flex; align-items: center; gap: 6px; cursor: pointer;
    border: 1px solid var(--ink); background: var(--ink); color: var(--paper);
    border-radius: 4px; padding: 7px 13px; font-size: 13px; font-weight: 600; }
  .btn:hover { background: #243646; }
  .btn.ghost { background: transparent; color: var(--ink); }
  .btn.ghost:hover { background: var(--vellum); }
  .btn.danger { border-color: var(--revision); background: var(--revision); }
  .btn.danger:hover { background: #a8271f; }
  .btn.sm { padding: 4px 9px; font-size: 12px; }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  /* — Tablas de datos (blame, locks) — */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; font-size: 11px; text-transform: uppercase;
    letter-spacing: .07em; color: var(--ink-soft); padding: 6px 8px;
    border-bottom: 1px solid var(--hairline); }
  td { padding: 6px 8px; border-bottom: 1px solid var(--hairline);
    font-family: var(--mono); font-size: 12px; }

  /* — SIGNATURE: el resolutor de conflictos — */
  .conflict { border: 1px solid var(--revision); border-radius: 5px;
    margin: 12px 0; overflow: hidden; }
  .conflict-head { background: var(--revision); color: #fff; padding: 7px 12px;
    font-family: var(--mono); font-size: 12px; display: flex; gap: 10px;
    align-items: center; }
  .conflict-head .cloud { font-weight: 700; }
  .sides { display: grid; grid-template-columns: 1fr 1fr; }
  .side { padding: 10px 12px; cursor: pointer; border: 2px solid transparent; }
  .side:first-child { border-right: 1px solid var(--hairline); }
  .side:hover { background: var(--vellum); }
  .side.picked { border-color: var(--blueprint); background: #eaf1fb; }
  .side .role { font-size: 11px; text-transform: uppercase; letter-spacing: .08em;
    color: var(--ink-soft); font-weight: 700; }
  .side .val { font-family: var(--mono); font-size: 12px; margin-top: 4px;
    word-break: break-all; }
  .side.picked .role { color: var(--blueprint); }

  .toast { position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: var(--paper); padding: 10px 18px;
    border-radius: 5px; font-size: 13px; box-shadow: 0 4px 18px rgba(0,0,0,.25);
    z-index: 50; max-width: 80vw; }
  .toast.err { background: var(--revision); }
  .empty { color: var(--ink-soft); padding: 40px 0; text-align: center; }
  .empty b { color: var(--ink); display: block; font-size: 15px;
    margin-bottom: 4px; }
  h2 { font-size: 15px; margin: 0 0 4px; }
  .ctx h2 { border-bottom: 1px solid var(--hairline); padding-bottom: 8px; }
  details summary { cursor: pointer; font-size: 13px; padding: 4px 0;
    font-weight: 600; }
</style>
</head>
<body>
<header>
  <span class="brand"><b>cad</b>vcs <span class="rev">▴</span></span>
  <span class="muted" style="font-size:12px">control de versiones de planos</span>
  <span class="spacer"></span>
  <span class="health" id="health"><span class="dot" style="background:#ccc"></span>…</span>
  <span class="token-field">
    token
    <input id="token" placeholder="Bearer JWT (vacío en modo dev)" spellcheck="false">
  </span>
</header>

<main>
  <nav class="rail">
    <div class="eyebrow">Repositorios</div>
    <div id="repos"></div>
    <div class="row" style="margin-top:8px">
      <input class="txt mono" id="newRepo" placeholder="nombre" style="flex:1">
      <button class="btn sm" id="createRepo">Crear</button>
    </div>
    <div id="branchSection" style="display:none">
      <div class="eyebrow">Ramas</div>
      <div id="branches"></div>
      <div class="eyebrow">Etiquetas</div>
      <div id="tags"></div>
    </div>
  </nav>

  <section class="canvas">
    <div id="placeholder" class="empty">
      <b>Elige un repositorio</b>
      Su historial, planos y conflictos aparecerán aquí.
    </div>
    <div id="workspace" style="display:none">
      <div class="tabs">
        <div class="tab active" data-view="log">Historial</div>
        <div class="tab" data-view="diff">Comparar</div>
        <div class="tab" data-view="merge">Fusionar</div>
        <div class="tab" data-view="blame">Autoría</div>
        <div class="tab" data-view="locks">Bloqueos</div>
      </div>
      <div id="view" class="fade"></div>
    </div>
  </section>

  <aside class="ctx" id="ctx">
    <div class="empty muted">Sin selección</div>
  </aside>
</main>

<script>
"use strict";
// ——— Estado mínimo en memoria ———
const S = { repo: null, branch: null, view: "log", repoInfo: null };
const $ = (s, r=document) => r.querySelector(s);
const el = (t, props={}, ...kids) => {
  const n = Object.assign(document.createElement(t), props);
  for (const k of kids) n.append(k.nodeType ? k : document.createTextNode(k));
  return n;
};

// Token en sessionStorage para sobrevivir recargas (no es un artifact)
const tokenInput = $("#token");
tokenInput.value = sessionStorage.getItem("cadvcs_token") || "";
tokenInput.addEventListener("change", () =>
  sessionStorage.setItem("cadvcs_token", tokenInput.value.trim()));

async function api(path, opts={}) {
  const headers = Object.assign({}, opts.headers);
  const tok = tokenInput.value.trim();
  if (tok) headers["Authorization"] = "Bearer " + tok;
  if (opts.json !== undefined) {
    headers["Content-Type"] = "application/json";
    opts.body = JSON.stringify(opts.json);
  }
  const res = await fetch(path, { ...opts, headers });
  if (res.status === 204) return null;
  const ct = res.headers.get("content-type") || "";
  const data = ct.includes("json") ? await res.json() : await res.text();
  if (!res.ok) {
    const msg = (data && data.detail) ? data.detail : ("HTTP " + res.status);
    const e = new Error(typeof msg === "string" ? msg : JSON.stringify(msg));
    e.status = res.status; e.data = data;
    throw e;
  }
  return data;
}
async function svgInto(node, path) {
  node.innerHTML = '<span class="muted">renderizando…</span>';
  try {
    const headers = {};
    const tok = tokenInput.value.trim();
    if (tok) headers["Authorization"] = "Bearer " + tok;
    const res = await fetch(path, { headers });
    if (!res.ok) throw new Error("HTTP " + res.status);
    node.innerHTML = await res.text();
  } catch (e) { node.innerHTML = '<span class="muted">sin vista previa</span>'; }
}

function toast(msg, isErr=false) {
  const t = el("div", { className: "toast" + (isErr ? " err" : ""), textContent: msg });
  document.body.append(t);
  setTimeout(() => t.remove(), isErr ? 4200 : 2400);
}

// ——— Health ———
async function refreshHealth() {
  const h = $("#health");
  try {
    const d = await api("/health");
    const ok = d.status === "ok";
    h.innerHTML = "";
    h.append(el("span", { className: "dot",
      style: "background:" + (ok ? "#16a34a" : "#c8312b") }));
    h.append(document.createTextNode(
      d.backend + " · " + d.blob_backend + (ok ? "" : " · degradado")));
  } catch (e) {
    h.innerHTML = '<span class="dot" style="background:#c8312b"></span>API no disponible';
  }
}

// ——— Repos ———
async function loadRepos() {
  const box = $("#repos"); box.innerHTML = "";
  let repos = [];
  try { repos = await api("/repos"); }
  catch (e) { box.append(el("div", { className: "muted", textContent: e.message })); return; }
  if (!repos.length) box.append(el("div", { className: "muted", textContent: "ninguno aún" }));
  for (const r of repos) {
    const item = el("div", { className: "repo-item" + (r.name === S.repo ? " active" : "") });
    item.append(el("span", {}, r.name));
    item.onclick = () => selectRepo(r.name);
    box.append(item);
  }
}

$("#createRepo").onclick = async () => {
  const name = $("#newRepo").value.trim();
  if (!name) return;
  try {
    await api("/repos", { method: "POST", json: { name } });
    $("#newRepo").value = "";
    toast("Repositorio " + name + " creado");
    await loadRepos(); selectRepo(name);
  } catch (e) { toast(e.message, true); }
};

async function selectRepo(name) {
  S.repo = name;
  $("#placeholder").style.display = "none";
  $("#workspace").style.display = "block";
  $("#branchSection").style.display = "block";
  try { S.repoInfo = await api("/repos/" + name); S.branch = S.repoInfo.current_branch; }
  catch (e) { toast(e.message, true); return; }
  await Promise.all([loadRepos(), loadBranches()]);
  renderView();
}

async function loadBranches() {
  const bb = $("#branches"), tb = $("#tags");
  bb.innerHTML = ""; tb.innerHTML = "";
  try {
    const branches = await api("/repos/" + S.repo + "/branches");
    for (const b of branches) {
      const it = el("div", { className: "branch-item" + (b.current ? " active" : "") });
      if (b.current) it.append(el("span", { className: "cur", textContent: "●" }));
      it.append(el("span", {}, b.name));
      it.append(el("span", { className: "muted mono", style: "margin-left:auto;font-size:11px",
        textContent: b.head_commit_id ? "c" + b.head_commit_id : "—" }));
      it.onclick = () => switchBranch(b.name);
      bb.append(it);
    }
    const tags = await api("/repos/" + S.repo + "/tags");
    if (!tags.length) tb.append(el("div", { className: "muted", textContent: "ninguna" }));
    for (const t of tags) {
      const it = el("div", { className: "branch-item" });
      it.append(el("span", { className: "mono rev", textContent: "⚑" }));
      it.append(el("span", {}, t.name));
      it.append(el("span", { className: "muted mono", style: "margin-left:auto;font-size:11px",
        textContent: "c" + t.commit_id }));
      tb.append(it);
    }
  } catch (e) { bb.append(el("div", { className: "muted", textContent: e.message })); }
}

async function switchBranch(name) {
  try {
    await api("/repos/" + S.repo + "/switch", { method: "POST", json: { branch: name } });
    S.branch = name; toast("En rama " + name);
    await loadBranches(); renderView();
  } catch (e) { toast(e.message, true); }
}

// ——— Tabs ———
document.querySelectorAll(".tab").forEach(t => t.onclick = () => {
  document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
  t.classList.add("active"); S.view = t.dataset.view; renderView();
});

function renderView() {
  if (!S.repo) return;
  ({ log: viewLog, diff: viewDiff, merge: viewMerge,
     blame: viewBlame, locks: viewLocks })[S.view]();
}

// ——— Vista: Historial ———
async function viewLog() {
  const v = $("#view"); v.innerHTML = "";
  let commits = [];
  try { commits = await api("/repos/" + S.repo + "/commits?limit=100"); }
  catch (e) { v.append(el("div", { className: "empty", textContent: e.message })); return; }
  if (!commits.length) {
    v.append(el("div", { className: "empty" },
      el("b", {}, "Sin commits"), "Sube un plano y haz tu primer commit."));
    return;
  }
  const ul = el("ul", { className: "log" });
  for (const c of commits) {
    const li = el("li", { className: "commit" });
    const cid = el("span", { className: "cid" + (c.is_merge ? " merge" : "") }, "c" + c.id);
    const msg = el("span", { className: "msg" });
    msg.append(c.message || el("span", { className: "muted" }, "(sin mensaje)"));
    for (const b of (c.branches || [])) msg.append(el("span", { className: "deco" }, b));
    for (const t of (c.tags || [])) msg.append(el("span", { className: "deco tag" }, "⚑ " + t));
    li.append(cid, msg, el("span", { className: "who" }, c.author));
    li.onclick = () => showCommit(c);
    ul.append(li);
  }
  v.append(ul);
}

function showCommit(c) {
  const ctx = $("#ctx"); ctx.innerHTML = "";
  ctx.append(el("h2", {}, "Commit c" + c.id + (c.is_merge ? " · fusión" : "")));
  ctx.append(el("div", { className: "muted mono", style: "font-size:12px;margin-bottom:10px" },
    c.author + " · " + c.created_at));
  ctx.append(el("p", {}, c.message || "(sin mensaje)"));
  const lineage = [c.parent_id, c.parent2_id].filter(Boolean).map(p => "c" + p).join(", ");
  if (lineage) ctx.append(el("div", { className: "muted mono", style: "font-size:12px" },
    "padre(s): " + lineage));
}

// ——— Vista: Comparar (diff visual) ———
async function viewDiff() {
  const v = $("#view"); v.innerHTML = "";
  const refs = await refList();
  const wrap = el("div");
  const selA = refSelect(refs, "main"), selB = refSelect(refs, S.branch);
  const pathSel = el("select");
  wrap.append(el("div", { className: "row" },
    labelled("Base", selA), labelled("Comparar con", selB), labelled("Plano", pathSel)));
  const summary = el("div", { className: "muted mono", style: "margin:12px 0" });
  const vp = el("div", { className: "viewport" });
  wrap.append(summary, vp, el("div", { className: "legend" },
    el("span", { className: "lg-add" }, "añadido"),
    el("span", { className: "lg-mod" }, "modificado"),
    el("span", { className: "lg-del" }, "eliminado / previo")));
  v.append(wrap);

  async function populatePaths() {
    pathSel.innerHTML = "";
    try {
      const d = await api("/repos/" + S.repo + "/diff?ref_a=" + selA.value + "&ref_b=" + selB.value);
      const dxf = Object.keys(d.modified).filter(p => p.toLowerCase().endsWith(".dxf"));
      const parts = [];
      if (d.added.length) parts.push("+" + d.added.length);
      if (d.removed.length) parts.push("−" + d.removed.length);
      if (Object.keys(d.modified).length) parts.push("~" + Object.keys(d.modified).length);
      summary.textContent = parts.length ? ("archivos: " + parts.join("  ")) : "sin diferencias";
      for (const p of dxf) pathSel.append(el("option", { value: p, textContent: p }));
      if (!dxf.length) { vp.innerHTML = '<span class="muted">ningún DXF modificado entre estas refs</span>'; }
      else renderVisual();
    } catch (e) { summary.textContent = e.message; }
  }
  function renderVisual() {
    if (!pathSel.value) return;
    svgInto(vp, "/repos/" + S.repo + "/diff/visual?ref_a=" + selA.value +
      "&ref_b=" + selB.value + "&path=" + encodeURIComponent(pathSel.value));
  }
  selA.onchange = selB.onchange = populatePaths;
  pathSel.onchange = renderVisual;
  populatePaths();
  ctxHint("Comparar versiones", "Verde añadido, ámbar modificado, rojo eliminado " +
    "o estado previo. Solo planos DXF tienen vista geométrica.");
}

// ——— Vista: Fusionar + resolutor de conflictos (SIGNATURE) ———
async function viewMerge() {
  const v = $("#view"); v.innerHTML = "";
  const branches = (await api("/repos/" + S.repo + "/branches")).filter(b => !b.current);
  if (!branches.length) {
    v.append(el("div", { className: "empty" }, el("b", {}, "Nada que fusionar"),
      "Crea otra rama para fusionarla en " + S.branch + "."));
    return;
  }
  const sel = el("select");
  for (const b of branches) sel.append(el("option", { value: b.name, textContent: b.name }));
  const runRow = el("div", { className: "row", style: "margin-bottom:14px" },
    labelled("Traer rama", sel));
  const btn = el("button", { className: "btn" }, "Fusionar en " + S.branch);
  runRow.append(el("div", { style: "align-self:flex-end" }, btn));
  const out = el("div");
  v.append(el("p", { className: "muted" },
    "La fusión combina cambios en entidades distintas automáticamente. " +
    "Si dos ramas tocan la misma entidad, la resuelves abajo."), runRow, out);

  btn.onclick = () => attemptMerge(sel.value, out, {});
  ctxHint("Fusión por entidad", "Los conflictos se resuelven plano a plano, " +
    "eligiendo el lado a conservar por cada entidad en discordia.");
}

async function attemptMerge(branch, out, resolutions) {
  out.innerHTML = "";
  const endpoint = Object.keys(resolutions).length ? "/merge/resolve" : "/merge";
  try {
    const body = { branch };
    if (endpoint === "/merge/resolve") body.resolutions = resolutions;
    const r = await api("/repos/" + S.repo + endpoint, { method: "POST", json: body });
    const label = { merged: "Fusión completada", "fast-forward": "Avance rápido",
      "already-up-to-date": "Ya actualizado" }[r.result] || r.result;
    toast(label + (r.commit_id ? " · c" + r.commit_id : ""));
    out.append(el("div", { className: "viewport", style: "min-height:auto;justify-content:flex-start" },
      el("span", { className: "mono" }, "✓ " + label)));
    loadBranches(); 
  } catch (e) {
    if (e.status === 409 && e.data && e.data.conflicts) {
      renderConflicts(branch, out, e.data.conflicts);
    } else { toast(e.message, true); }
  }
}

// El resolutor: nubes de revisión por entidad, elección ours/theirs.
function renderConflicts(branch, out, conflicts, prev={}) {
  out.innerHTML = "";
  const picks = Object.assign({}, prev);
  const banner = el("div", { className: "row", style: "margin:6px 0 14px" });
  const count = el("span", { className: "mono muted" });
  const resolveBtn = el("button", { className: "btn danger" }, "Resolver y fusionar");
  banner.append(count, resolveBtn);
  out.append(el("h2", {}, "Conflictos de fusión"), banner);

  const flat = [];  // (path, conflict)
  for (const [path, list] of Object.entries(conflicts)) {
    if (list === "binary") {
      out.append(el("div", { className: "conflict" },
        el("div", { className: "conflict-head" },
          el("span", { className: "cloud" }, "⬡ binario"), path)));
      flat.push([path, { handle: "__file__", binary: true }]);
      continue;
    }
    for (const c of list) {
      flat.push([path, c]);
      const card = el("div", { className: "conflict" });
      const key = path + "::" + c.handle;
      card.append(el("div", { className: "conflict-head" },
        el("span", { className: "cloud" }, "⬡ " + c.reason),
        c.dxftype + " · handle " + c.handle, el("span", { style: "flex:1" }),
        el("span", {}, path)));
      const sides = el("div", { className: "sides" });
      const oursSide = sideCard("ours (esta rama)", c.ours);
      const theirsSide = sideCard("theirs (" + branch + ")", c.theirs);
      const setPick = (which) => {
        picks[key] = which;
        oursSide.classList.toggle("picked", which === "ours");
        theirsSide.classList.toggle("picked", which === "theirs");
        updateCount();
      };
      oursSide.onclick = () => setPick("ours");
      theirsSide.onclick = () => setPick("theirs");
      if (prev[key]) setPick(prev[key]);
      sides.append(oursSide, theirsSide);
      card.append(sides);
      out.append(card);
    }
  }
  function updateCount() {
    const done = flat.filter(([p, c]) => picks[p + "::" + c.handle]).length;
    count.textContent = done + " / " + flat.length + " resueltos";
    resolveBtn.disabled = done < flat.length;
    resolveBtn.style.opacity = done < flat.length ? .5 : 1;
  }
  updateCount();
  resolveBtn.onclick = () => {
    const resolutions = {};
    for (const [path, c] of flat) {
      const which = picks[path + "::" + c.handle];
      (resolutions[path] = resolutions[path] || {})[c.handle] = which;
    }
    attemptMerge(branch, out, resolutions);
  };
}

function sideCard(role, payload) {
  const card = el("div", { className: "side" });
  card.append(el("div", { className: "role" }, role));
  let val = "(eliminada)";
  if (payload && payload.attrs) {
    const a = payload.attrs;
    val = a.center ? ("centro " + JSON.stringify(a.center)) :
          JSON.stringify(a).slice(0, 120);
  }
  card.append(el("div", { className: "val" }, val));
  return card;
}

// ——— Vista: Autoría (blame) ———
async function viewBlame() {
  const v = $("#view"); v.innerHTML = "";
  const refs = await refList();
  const pathSel = el("select");
  for (const p of await dxfPaths()) pathSel.append(el("option", { value: p, textContent: p }));
  if (!pathSel.options.length) {
    v.append(el("div", { className: "empty" }, el("b", {}, "Sin planos DXF"),
      "La autoría por entidad requiere un plano DXF en esta rama."));
    return;
  }
  v.append(el("div", { className: "row" }, labelled("Plano", pathSel)));
  const tbl = el("table");
  v.append(tbl);
  async function load() {
    tbl.innerHTML = "";
    try {
      const rows = await api("/repos/" + S.repo + "/blame/" +
        encodeURIComponent(pathSel.value));
      tbl.append(el("thead", {}, rowEl("th", ["Entidad", "Tipo", "Capa", "Commit", "Autor", "Mensaje"])));
      const body = el("tbody");
      for (const r of rows) body.append(rowEl("td",
        [r.handle, r.dxftype, r.layer, "c" + (r.commit_id ?? "?"),
         r.author ?? "?", r.message ?? ""]));
      tbl.append(body);
    } catch (e) { tbl.append(el("caption", { className: "muted" }, e.message)); }
  }
  pathSel.onchange = load; load();
  ctxHint("Autoría por entidad", "Cada entidad se atribuye al commit que la " +
    "dejó en su estado actual, incluso a través de fusiones.");
}

// ——— Vista: Bloqueos ———
async function viewLocks() {
  const v = $("#view"); v.innerHTML = "";
  const tbl = el("table");
  const add = el("div", { className: "row", style: "margin-top:14px" });
  const pathInput = el("input", { className: "txt mono", placeholder: "ruta/al/plano.dwg" });
  const lockBtn = el("button", { className: "btn sm" }, "Bloquear");
  add.append(el("div", { style: "flex:1" }, pathInput), lockBtn);
  v.append(tbl, add);
  async function load() {
    tbl.innerHTML = "";
    try {
      const locks = await api("/repos/" + S.repo + "/locks");
      tbl.append(el("thead", {}, rowEl("th", ["Plano", "Propietario", "Expira", ""])));
      const body = el("tbody");
      if (!locks.length) body.append(el("tr", {},
        el("td", { colSpan: 4, className: "muted" }, "ningún bloqueo activo")));
      for (const l of locks) {
        const tr = el("tr", {},
          el("td", {}, l.path), el("td", {}, l.owner), el("td", {}, l.expires_at));
        const td = el("td");
        const un = el("button", { className: "btn ghost sm" }, "Liberar");
        un.onclick = async () => {
          try { await api("/repos/" + S.repo + "/locks/" + encodeURIComponent(l.path),
            { method: "DELETE" }); toast("Liberado"); load(); }
          catch (e) { toast(e.message, true); }
        };
        td.append(un); tr.append(td); body.append(tr);
      }
      tbl.append(body);
    } catch (e) { tbl.append(el("caption", { className: "muted" }, e.message)); }
  }
  lockBtn.onclick = async () => {
    if (!pathInput.value.trim()) return;
    try {
      await api("/repos/" + S.repo + "/locks", { method: "POST",
        json: { path: pathInput.value.trim() } });
      pathInput.value = ""; toast("Bloqueado"); load();
    } catch (e) { toast(e.message, true); }
  };
  load();
  ctxHint("Bloqueos", "Los planos binarios (DWG) no se fusionan: el bloqueo " +
    "evita ediciones en paralelo que se pisarían.");
}

// ——— Helpers ———
async function refList() {
  const out = [];
  try {
    for (const b of await api("/repos/" + S.repo + "/branches")) out.push(b.name);
    for (const t of await api("/repos/" + S.repo + "/tags")) out.push(t.name);
  } catch (e) {}
  return out;
}
async function dxfPaths() {
  try {
    const st = await api("/repos/" + S.repo + "/status");
    const set = new Set([...st.clean, ...st.modified, ...st.new]);
    return [...set].filter(p => p.toLowerCase().endsWith(".dxf"));
  } catch (e) { return []; }
}
function refSelect(refs, sel) {
  const s = el("select");
  for (const r of refs) s.append(el("option", { value: r, textContent: r, selected: r === sel }));
  return s;
}
function labelled(text, control) {
  return el("div", {}, el("label", { className: "fld" }, text), control);
}
function rowEl(tag, cells) {
  const tr = el("tr");
  for (const c of cells) tr.append(el(tag, {}, String(c)));
  return tr;
}
function ctxHint(title, body) {
  const ctx = $("#ctx"); ctx.innerHTML = "";
  ctx.append(el("h2", {}, title), el("p", { className: "muted" }, body));
}

// ——— Arranque ———
refreshHealth(); loadRepos();
setInterval(refreshHealth, 15000);
</script>
